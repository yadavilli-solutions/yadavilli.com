<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:image" content="{{ .Site.BaseURL }}img/og-default.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="twitter:site" content="@YadavilliAI">
<meta name="twitter:image" content="{{ .Site.BaseURL }}img/og-default.png">

<!-- JSON-LD -->
{{ if .IsHome }}
<script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"Yadavilli Solutions","url":"{{ .Site.BaseURL }}","description":"{{ .Site.Params.description }}","sameAs":[]}</script>
{{ end }}
{{ if not .IsHome }}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Article","headline":"{{ .Title }}","datePublished":"{{ .Date.Format "2006-01-02" }}","dateModified":"{{ .Lastmod.Format "2006-01-02" }}","author":{"@type":"Organization","name":"Yadavilli Solutions","url":"{{ .Site.BaseURL }}"},"publisher":{"@type":"Organization","name":"Yadavilli Solutions"},"description":"{{ .Description | default (.Summary | plainify) }}"}
</script>
{{ end }}

<!-- Styles & Fonts -->
<link rel="stylesheet" href="/css/yadavilli.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
