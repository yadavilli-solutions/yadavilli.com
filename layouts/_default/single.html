{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <div class="page-hero-content fade-up">
      {{ with .Params.tag }}<div class="section-tag">{{ . }}</div>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page-subtitle">{{ . }}</p>{{ end }}
    </div>
  </div>
</section>

<section class="page-content">
  <div class="container">
    <div class="prose fade-up">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
