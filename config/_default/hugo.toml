title = "Yadavilli Solutions | AI Consulting"
theme = "blowfish"

[languages]
  [languages.en]
    locale = "en-us"
    contentDir = "content"
    weight = 1

[params]
  colorScheme = "indigo"
  defaultAppearance = "dark"
  showSummary = true
  showTableOfContents = true
  
  [params.header]
    layout = "fixed-fill-blur"
  
  [params.footer]
    showCopyright = true
    showPoweredBy = false

  [params.homepage]
    layout = "hero"
    homepageImage = "img/hero.png"
    showRecent = true
    showRecentItems = 3
    disableHeroImageFilter = false

  [params.author]
    name = "Yadavilli Solutions"
    headline = "The **Agentic AI** Modernization Firm"
    image = "img/hero.png"

  [params.social]
    linkedin = "yadavilli"
    twitter = "YadavilliAI"
    github = "yadavilli"

