name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'

      - name: Build
        run: hugo --minify

      - name: Install Workers dependencies
        run: |
          if [ -d "workers-site" ]; then
            cd workers-site && npm install
          fi

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post new Insights articles to Substack
        if: success()
        run: |
          uv pip install --system python-frontmatter markdown requests -q
          python scripts/post-to-substack.py
        env:
          SUBSTACK_SESSION_COOKIE: ${{ secrets.SUBSTACK_SESSION_COOKIE }}
