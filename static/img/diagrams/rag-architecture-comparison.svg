<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#09090b" rx="12"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BEFORE SECTION                                  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Before label -->
  <rect x="24" y="18" width="188" height="26" rx="6" fill="#3f1818" stroke="#7f1d1d" stroke-width="1"/>
  <text x="118" y="35" fill="#fca5a5" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">THE COPY-CAT STACK</text>

  <!-- Client box -->
  <rect x="24" y="58" width="120" height="64" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="84" y="82" fill="#fafafa" font-size="12" font-weight="600" text-anchor="middle">Client</text>
  <text x="84" y="98" fill="#71717a" font-size="10" text-anchor="middle">Web · APIs</text>
  <text x="84" y="112" fill="#71717a" font-size="10" text-anchor="middle">Agents</text>

  <!-- Arrow 1 -->
  <line x1="144" y1="90" x2="178" y2="90" stroke="#3f3f46" stroke-width="1.5"/>
  <polygon points="178,86 186,90 178,94" fill="#3f3f46"/>

  <!-- API Gateway box -->
  <rect x="186" y="58" width="130" height="64" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="251" y="82" fill="#fafafa" font-size="12" font-weight="600" text-anchor="middle">API Gateway</text>
  <text x="251" y="98" fill="#71717a" font-size="10" text-anchor="middle">Basic routing</text>
  <text x="251" y="112" fill="#71717a" font-size="10" text-anchor="middle">No intelligence</text>

  <!-- Arrow 2 -->
  <line x1="316" y1="90" x2="350" y2="90" stroke="#3f3f46" stroke-width="1.5"/>
  <polygon points="350,86 358,90 350,94" fill="#3f3f46"/>

  <!-- Bedrock box (highlighted as problematic) -->
  <rect x="358" y="48" width="190" height="84" rx="8" fill="#1c0a0a" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="453" y="72" fill="#fca5a5" font-size="12" font-weight="700" text-anchor="middle">Amazon Bedrock</text>
  <text x="453" y="90" fill="#9ca3af" font-size="10" text-anchor="middle">One model · Every request</text>
  <text x="453" y="106" fill="#ef4444" font-size="10" font-weight="600" text-anchor="middle">Same premium rate always</text>
  <text x="453" y="120" fill="#9ca3af" font-size="10" text-anchor="middle">No retrieval · No routing</text>

  <!-- Arrow 3 -->
  <line x1="548" y1="90" x2="582" y2="90" stroke="#3f3f46" stroke-width="1.5"/>
  <polygon points="582,86 590,90 582,94" fill="#3f3f46"/>

  <!-- Response box -->
  <rect x="590" y="58" width="130" height="64" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="655" y="82" fill="#fafafa" font-size="12" font-weight="600" text-anchor="middle">Response</text>
  <text x="655" y="98" fill="#71717a" font-size="10" text-anchor="middle">Hopefully correct</text>
  <text x="655" y="112" fill="#71717a" font-size="10" text-anchor="middle">No audit trail</text>

  <!-- Before note -->
  <rect x="24" y="136" width="696" height="30" rx="6" fill="#1c0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="372" y="155" fill="#fca5a5" font-size="11" text-anchor="middle">Simple query, complex reasoning, or retrieval - everything bills at your largest model's rate. Zero routing intelligence.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- VS DIVIDER                                      -->
  <!-- ═══════════════════════════════════════════════ -->

  <line x1="24" y1="196" x2="390" y2="196" stroke="#1f1f24" stroke-width="1"/>
  <rect x="390" y="182" width="120" height="28" rx="14" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="450" y="200" fill="#71717a" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">vs the right way</text>
  <line x1="510" y1="196" x2="876" y2="196" stroke="#1f1f24" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- AFTER SECTION                                   -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- After label -->
  <rect x="24" y="216" width="222" height="26" rx="6" fill="#052e16" stroke="#14532d" stroke-width="1"/>
  <text x="135" y="233" fill="#86efac" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="0.5">THE ARCHITECT STACK - LLM-D + vLLM</text>

  <!-- Row 1 boxes -->

  <!-- 1. Client -->
  <rect x="24" y="256" width="108" height="72" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="78" y="274" fill="#06b6d4" font-size="10" font-weight="700" text-anchor="middle">1 · Clients</text>
  <text x="78" y="290" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">Web · APIs</text>
  <text x="78" y="304" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">Agents</text>
  <text x="78" y="318" fill="#71717a" font-size="9" text-anchor="middle">All request types</text>

  <!-- Arrow -->
  <line x1="132" y1="292" x2="152" y2="292" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="152,288 160,292 152,296" fill="#06b6d4"/>

  <!-- 2. Edge -->
  <rect x="160" y="256" width="118" height="72" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="219" y="274" fill="#06b6d4" font-size="10" font-weight="700" text-anchor="middle">2 · Edge (AWS)</text>
  <text x="219" y="290" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">API GW + WAF</text>
  <text x="219" y="304" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">+ Cognito</text>
  <text x="219" y="318" fill="#71717a" font-size="9" text-anchor="middle">TLS · Rate limit · Auth</text>

  <!-- Arrow -->
  <line x1="278" y1="292" x2="298" y2="292" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="298,288 306,292 298,296" fill="#06b6d4"/>

  <!-- 3. LLM-D (key differentiator) -->
  <rect x="306" y="246" width="148" height="92" rx="8" fill="#0a1f2e" stroke="#06b6d4" stroke-width="2"/>
  <text x="380" y="265" fill="#06b6d4" font-size="10" font-weight="700" text-anchor="middle">3 · LLM-D Gateway</text>
  <text x="380" y="281" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">Intelligent Routing</text>
  <text x="380" y="296" fill="#71717a" font-size="9" text-anchor="middle">Routes by request type</text>
  <text x="380" y="309" fill="#71717a" font-size="9" text-anchor="middle">KV cache affinity</text>
  <text x="380" y="322" fill="#71717a" font-size="9" text-anchor="middle">Policy enforcement</text>

  <!-- Arrow -->
  <line x1="454" y1="292" x2="474" y2="292" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="474,288 482,292 474,296" fill="#06b6d4"/>

  <!-- 4. RAG Orchestrator -->
  <rect x="482" y="256" width="148" height="72" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="556" y="274" fill="#06b6d4" font-size="10" font-weight="700" text-anchor="middle">4 · RAG Orchestrator</text>
  <text x="556" y="290" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">Request Parsing</text>
  <text x="556" y="304" fill="#fafafa" font-size="11" font-weight="600" text-anchor="middle">Prompt Building</text>
  <text x="556" y="318" fill="#71717a" font-size="9" text-anchor="middle">retrieve? tools? direct LLM?</text>

  <!-- Down arrow from RAG -->
  <line x1="556" y1="328" x2="556" y2="354" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="552,354 556,362 560,354" fill="#06b6d4"/>

  <!-- ── Bottom row ── -->

  <!-- Vector DB -->
  <rect x="388" y="362" width="110" height="56" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="443" y="381" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Vector DB</text>
  <text x="443" y="396" fill="#71717a" font-size="9" text-anchor="middle">Qdrant / FalkorDB</text>
  <text x="443" y="409" fill="#71717a" font-size="9" text-anchor="middle">Semantic retrieval</text>

  <!-- vLLM on EKS -->
  <rect x="514" y="362" width="116" height="56" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="572" y="381" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">vLLM on EKS</text>
  <text x="572" y="396" fill="#71717a" font-size="9" text-anchor="middle">Right model</text>
  <text x="572" y="409" fill="#71717a" font-size="9" text-anchor="middle">Right cost tier</text>

  <!-- Tool APIs -->
  <rect x="646" y="362" width="110" height="56" rx="8" fill="#111114" stroke="#1f1f24" stroke-width="1"/>
  <text x="701" y="381" fill="#10b981" font-size="10" font-weight="700" text-anchor="middle">Tool APIs</text>
  <text x="701" y="396" fill="#71717a" font-size="9" text-anchor="middle">External actions</text>
  <text x="701" y="409" fill="#71717a" font-size="9" text-anchor="middle">Verified outputs</text>

  <!-- Connector lines from RAG to bottom row -->
  <line x1="530" y1="362" x2="490" y2="362" stroke="#1f1f24" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="572" y1="362" x2="572" y2="362" stroke="#1f1f24" stroke-width="1"/>
  <line x1="610" y1="362" x2="662" y2="362" stroke="#1f1f24" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Merge arrow to Response -->
  <line x1="630" y1="390" x2="780" y2="390" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="780,386 788,390 780,394" fill="#10b981"/>

  <!-- Response box -->
  <rect x="788" y="362" width="86" height="56" rx="8" fill="#052e16" stroke="#14532d" stroke-width="1.5"/>
  <text x="831" y="385" fill="#86efac" font-size="11" font-weight="700" text-anchor="middle">Response</text>
  <text x="831" y="400" fill="#71717a" font-size="9" text-anchor="middle">Auditable</text>
  <text x="831" y="413" fill="#71717a" font-size="9" text-anchor="middle">Optimized cost</text>

  <!-- After note -->
  <rect x="24" y="442" width="852" height="54" rx="6" fill="#052e16" stroke="#14532d" stroke-width="1"/>
  <text x="450" y="462" fill="#86efac" font-size="11" font-weight="600" text-anchor="middle">Each request routed to the right backend at the right cost tier. Retrieval only when needed. Every action observable.</text>
  <text x="450" y="482" fill="#71717a" font-size="10" text-anchor="middle">LLM-D handles intelligent routing and KV cache affinity. RAG Orchestrator decides retrieve vs. direct vs. tool. vLLM scales per model, not per request.</text>

</svg>
